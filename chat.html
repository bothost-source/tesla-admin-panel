<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Live Chat | Tesla Admin</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/dashboard.css">
<link rel="stylesheet" href="css/chat.css">
<style>
/* ===== WHATSAPP-STYLE LAYOUT ===== */
.chat-app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    background: var(--tesla-dark, #0a0e1a);
}

/* --- Screen 1: Conversation List --- */
.chat-list-screen {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}
.chat-list-header {
    background: var(--tesla-navy, #111827);
    padding: 16px 20px;
    border-bottom: 1px solid var(--tesla-border, #2a3247);
    display: flex;
    align-items: center;
    justify-content: space-between;
}
.chat-list-header h4 {
    color: #fff;
    margin: 0;
    font-weight: 700;
    font-size: 1.1rem;
}
.chat-list-search {
    padding: 12px 16px;
    background: var(--tesla-navy, #111827);
    border-bottom: 1px solid var(--tesla-border, #2a3247);
}
.chat-list-search input {
    width: 100%;
    background: var(--tesla-input, #1e2535);
    border: 1px solid var(--tesla-border, #2a3247);
    color: #fff;
    padding: 10px 14px 10px 36px;
    border-radius: 10px;
    font-size: .9rem;
}
.chat-list-search i {
    position: absolute;
    left: 28px;
    top: 50%;
    transform: translateY(-50%);
    color: #64748b;
}
.chat-list-items {
    flex: 1;
    overflow-y: auto;
}
.chat-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 16px;
    border-bottom: 1px solid rgba(255,255,255,0.03);
    cursor: pointer;
    transition: background .2s;
    position: relative;
}
.chat-item:hover,
.chat-item:active {
    background: rgba(255,255,255,0.03);
}
.chat-item.unread {
    background: rgba(232,33,39,0.05);
}
.chat-item-avatar {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: linear-gradient(135deg, #e82127, #ff6b6b);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 1rem;
    flex-shrink: 0;
}
.chat-item-info {
    flex: 1;
    min-width: 0;
}
.chat-item-info h6 {
    margin: 0 0 4px 0;
    color: #fff;
    font-size: .95rem;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
}
.chat-item-info p {
    margin: 0;
    color: #94a3b8;
    font-size: .85rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
.chat-item-time {
    color: #64748b;
    font-size: .75rem;
    flex-shrink: 0;
}
.chat-item-badge {
    position: absolute;
    right: 16px;
    bottom: 14px;
    background: var(--tesla-red, #e82127);
    color: #fff;
    font-size: .7rem;
    font-weight: 700;
    min-width: 20px;
    height: 20px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 6px;
}
.empty-state {
    text-align: center;
    padding: 60px 20px;
    color: #64748b;
}
.empty-state i {
    font-size: 3rem;
    display: block;
    margin-bottom: 16px;
    color: var(--tesla-border, #2a3247);
}
.empty-state p {
    margin: 0;
    font-size: .9rem;
}

/* --- Screen 2: Individual Chat --- */
.chat-screen {
    display: none;
    flex-direction: column;
    height: 100vh;
    position: fixed;
    inset: 0;
    z-index: 100;
    background: var(--tesla-dark, #0a0e1a);
}
.chat-screen.active {
    display: flex;
}
.chat-screen-header {
    background: var(--tesla-navy, #111827);
    padding: 12px 16px;
    border-bottom: 1px solid var(--tesla-border, #2a3247);
    display: flex;
    align-items: center;
    gap: 12px;
}
.chat-screen-header .back-btn {
    background: none;
    border: none;
    color: #fff;
    font-size: 1.3rem;
    padding: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
}
.chat-screen-header .header-avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: linear-gradient(135deg, #e82127, #ff6b6b);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: .9rem;
    flex-shrink: 0;
}
.chat-screen-header .header-info {
    flex: 1;
}
.chat-screen-header .header-info h5 {
    margin: 0;
    color: #fff;
    font-size: 1rem;
    font-weight: 600;
}
.chat-screen-header .header-info small {
    color: #22c55e;
    font-size: .75rem;
}
.chat-screen-messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    background: var(--tesla-dark, #0a0e1a);
}
.chat-screen-input {
    padding: 12px 16px;
    background: var(--tesla-navy, #111827);
    border-top: 1px solid var(--tesla-border, #2a3247);
    display: flex;
    gap: 10px;
    align-items: center;
}
.chat-screen-input input {
    flex: 1;
    background: var(--tesla-input, #1e2535);
    border: 1px solid var(--tesla-border, #2a3247);
    color: #fff;
    padding: 12px 16px;
    border-radius: 24px;
    font-size: .95rem;
}
.chat-screen-input input:focus {
    outline: none;
    border-color: var(--tesla-red, #e82127);
}
.chat-screen-input button {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: var(--tesla-red, #e82127);
    color: #fff;
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
}
.chat-screen-input button:active {
    transform: scale(0.95);
}

/* Message bubbles */
.msg-row {
    display: flex;
    margin-bottom: 14px;
    animation: msgIn .25s ease;
}
.msg-row.sent {
    justify-content: flex-end;
}
.msg-row.received {
    justify-content: flex-start;
}
.msg-bubble {
    max-width: 75%;
    padding: 10px 14px;
    border-radius: 18px;
    font-size: .9rem;
    line-height: 1.45;
    word-break: break-word;
}
.msg-row.sent .msg-bubble {
    background: var(--tesla-red, #e82127);
    color: #fff;
    border-bottom-right-radius: 4px;
}
.msg-row.received .msg-bubble {
    background: var(--tesla-input, #1e2535);
    color: var(--tesla-text, #e2e8f0);
    border: 1px solid var(--tesla-border, #2a3247);
    border-bottom-left-radius: 4px;
}
.msg-bubble .msg-time {
    display: block;
    margin-top: 4px;
    font-size: .65rem;
    opacity: .7;
}

@keyframes msgIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

/* Desktop: show sidebar + list side by side */
@media (min-width: 769px) {
    .dashboard {
        display: flex;
    }
    .sidebar {
        display: block !important;
        width: 260px;
        flex-shrink: 0;
    }
    .main-content {
        flex: 1;
        margin-left: 0 !important;
    }
    .chat-app {
        height: calc(100vh - 80px);
    }
    .chat-screen {
        position: relative;
        inset: auto;
        height: calc(100vh - 80px);
    }
}
</style>
</head>
<body>
<div class="dashboard">
<!-- Sidebar (desktop only) -->
<aside class="sidebar">
<div class="sidebar-header">
<img src="images/logo.png" class="sidebar-logo" alt="Tesla">
<h4><span class="text-danger">Tesla</span> Motors</h4>
</div>
<ul class="sidebar-menu">
<li><a href="index.html"><i class="bi bi-grid-fill"></i> Dashboard</a></li>
<li><a href="cars.html"><i class="bi bi-car-front-fill"></i> Cars</a></li>
<li><a href="orders.html"><i class="bi bi-bag-check-fill"></i> Orders</a></li>
<li><a href="customers.html"><i class="bi bi-people-fill"></i> Customers</a></li>
<li class="active"><a href="chat.html"><i class="bi bi-chat-dots-fill"></i> Live Chat</a></li>
<li><a href="payments.html"><i class="bi bi-credit-card-fill"></i> Payments</a></li>
<li><a href="analytics.html"><i class="bi bi-bar-chart-fill"></i> Analytics</a></li>
<li><a href="settings.html"><i class="bi bi-gear-fill"></i> Settings</a></li>
<li><a href="admins.html"><i class="bi bi-person-badge-fill"></i> Admins</a></li>
<li><a href="#" id="logoutBtn"><i class="bi bi-box-arrow-right"></i> Logout</a></li>
</ul>
</aside>

<main class="main-content">
<div class="topbar" style="display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid var(--tesla-border,#2a3247);">
<div>
<h2 class="page-title" style="margin:0;color:#fff;font-weight:700;">Live Chat</h2>
<p class="page-subtitle" style="margin:4px 0 0 0;color:#94a3b8;font-size:.85rem;">Tap a conversation to reply</p>
</div>
<span class="badge bg-success" style="font-size:.75rem;"><i class="bi bi-wifi"></i> Live</span>
</div>

<!-- ===== SCREEN 1: Conversation List ===== -->
<div class="chat-list-screen" id="chatListScreen">
<div class="chat-list-header">
<h4>Messages</h4>
<button onclick="clearAllChats()" style="background:none;border:none;color:#94a3b8;font-size:1.1rem;cursor:pointer;"><i class="bi bi-trash"></i></button>
</div>
<div class="chat-list-search" style="position:relative;">
<i class="bi bi-search"></i>
<input type="text" id="convoSearch" placeholder="Search customers..." oninput="filterConversations()">
</div>
<div class="chat-list-items" id="chatListItems">
<!-- Conversations injected here -->
</div>
</div>

<!-- ===== SCREEN 2: Individual Chat ===== -->
<div class="chat-screen" id="chatScreen">
<div class="chat-screen-header">
<button class="back-btn" onclick="closeChatScreen()"><i class="bi bi-arrow-left"></i></button>
<div class="header-avatar" id="chatScreenAvatar">--</div>
<div class="header-info">
<h5 id="chatScreenName">User</h5>
<small>● Online</small>
</div>
<button onclick="clearCurrentChat()" style="background:none;border:none;color:#94a3b8;font-size:1.1rem;cursor:pointer;"><i class="bi bi-trash"></i></button>
</div>
<div class="chat-screen-messages" id="chatScreenMessages">
<!-- Messages injected here -->
</div>
<div class="chat-screen-input">
<input type="text" id="chatScreenInput" placeholder="Type a message..." onkeydown="if(event.key==='Enter')sendChatScreenMessage()">
<button onclick="sendChatScreenMessage()"><i class="bi bi-send-fill"></i></button>
</div>
</div>

</main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script src="js/chat.js"></script>
<script src="js/sidebar.js"></script>
</body>
      </html>
