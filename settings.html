<html lang="en">

<head>

<meta charset="UTF-8">

content="width=device-width, initial-scale=1.0">

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link
rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<link
rel="stylesheet"
href="css/style.css">

<link
rel="stylesheet"
href="css/dashboard.css">

<link
rel="stylesheet"
href="css/settings.css">

</head>

<body>

<div class="dashboard">

<aside class="sidebar">

<div class="sidebar-header">

<img
src="images/logo.png"
class="sidebar-logo"
alt="Tesla">

<h4>

<span class="text-danger">

Tesla

</span>

Motors

</h4>

</div>

<ul class="sidebar-menu">

<li><a href="index.html"><i class="bi bi-grid-fill"></i> Dashboard</a></li>

<li><a href="cars.html"><i class="bi bi-car-front-fill"></i> Cars</a></li>

<li><a href="orders.html"><i class="bi bi-bag-check-fill"></i> Orders</a></li>

<li><a href="customers.html"><i class="bi bi-people-fill"></i> Customers</a></li>

<li><a href="chat.html"><i class="bi bi-chat-dots-fill"></i> Live Chat</a></li>

<li><a href="admins.html"><i class="bi bi-person-badge-fill"></i> Admins</a></li>

<li><a href="#" id="logoutBtn"><i class="bi bi-box-arrow-right"></i> Logout</a></li>

</ul>

</aside>

<main class="main-content">

<div class="topbar">

<div>

<h2>Settings</h2>

<p class="text-muted">

Manage system preferences

</p>

</div>

</div>

<div class="container-fluid">

<div class="row">

<div class="col-lg-6">

<div class="dashboard-card">

<h4 class="mb-4">

General Settings

</h4>

<div class="mb-3">

<label class="form-label">

Company Name

</label>

<input
type="text"
class="form-control"
value="Tesla Motors">

</div>

<div class="mb-3">

<label class="form-label">

Support Email

</label>

<input
type="email"
class="form-control"
value="support@tesla.com">

</div>

<div class="mb-3">

<label class="form-label">

Support Phone

</label>

<input
type="text"
class="form-control"
value="+1 800 TESLA">

</div>

<button class="btn btn-danger">

Save Changes

</button>

</div>

</div>

<div class="col-lg-6">

<div class="dashboard-card">

<h4 class="mb-4">

System Preferences

</h4>

<div class="form-check form-switch mb-3">

<input
class="form-check-input"
type="checkbox"
checked>

<label class="form-check-label">

Enable Notifications

</label>

</div>

<div class="form-check form-switch mb-3">

<input
class="form-check-input"
type="checkbox"
checked>

<label class="form-check-label">

Maintenance Mode

</label>

</div>

<div class="form-check form-switch mb-3">

<input
class="form-check-input"
type="checkbox">

<label class="form-check-label">

Allow Registration

</label>

</div>

</div>

</div>

<div class="dashboard-card mt-4">

    <h4 class="mb-4">

        Security Settings

    </h4>

    <div class="row">

        <div class="col-md-6">

            <label class="form-label">

                Admin Username

            </label>

            <input
                type="text"
                class="form-control"
                value="admin">

        </div>

        <div class="col-md-6">

            <label class="form-label">

                Admin Email

            </label>

            <input
                type="email"
                class="form-control"
                value="admin@tesla.com">

        </div>

    </div>

    <div class="row mt-3">

        <div class="col-md-6">

            <label class="form-label">

                New Password

            </label>

            <input
                type="password"
                class="form-control"
                placeholder="********">

        </div>

        <div class="col-md-6">

            <label class="form-label">

                Confirm Password

            </label>

            <input
                type="password"
                class="form-control"
                placeholder="********">

        </div>

    </div>

    <div class="mt-4">

        <button class="btn btn-dark">

            Update Password

        </button>

    </div>

</div>

        </div>

    </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="js/app.js"></script>

<script src="js/settings.js"></script>

<script src="js/sidebar.js"></script>

</body>

</html>
